<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════════
       YOUR PAGE STYLES
  ════════════════════════════════════════════════════════ -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #04080f;
      color: #e2eeff;
      font-family: 'JetBrains Mono', monospace;
      padding: 40px 24px;
      min-height: 100vh;
    }

    .page-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e2eeff;
      text-align: center;
      margin-bottom: 6px;
    }

    .page-title span { color: #00d4ff; }

    .page-sub {
      text-align: center;
      font-size: 0.6rem;
      color: #344d72;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* Grid layout for multiple viewers */
    .viewer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Each viewer lives in a wrapper — set the size here */
    .viewer-slot {
      height: 520px;
      border-radius: 4px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="page-title">3D Model <span>Gallery</span></div>
  <div class="page-sub">// Interactive Tech Preview System</div>

  <!-- ═══════════════════════════════════════════════════════
    HOW TO USE:
    1. Add a <div class="viewer-slot" id="viewer-A"></div>
       for each model you want to show.
    2. At the bottom, call createViewer({ ... }) once per model.
    3. Set objFile, title, tag, and parts to match your model.
  ════════════════════════════════════════════════════════ -->

  <div class="viewer-grid">

    <!-- Viewer 1 — Football Helmet -->
    <div class="viewer-slot" id="viewer-A"></div>

    <!-- Viewer 2 — second model (swap objFile + parts) -->
    <div class="viewer-slot" id="viewer-B"></div>

    <!-- Add more viewers: <div class="viewer-slot" id="viewer-C"></div> -->

  </div>


  <!-- ═══════════════════════════════════════════════════════
    SCRIPTS — include once, before </body>
  ════════════════════════════════════════════════════════ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

  <script>
  /* ================================================================
     createViewer(config)
     ─────────────────────────────────────────────────────────────────
     Injects a fully self-contained 3D viewer into any container div.
     Each instance is completely isolated — styles, state, and IDs
     are all scoped to a unique generated key.

     CONFIG OPTIONS:
       containerId  — id of the <div> to inject into             (required)
       objFile      — path to your .obj file                     (required)
       title        — model display name in sidebar              (required)
       tag          — category label shown above title           (required)
       parts        — array of part definitions (see below)      (required)
       camDist      — initial camera distance   (default: 22)    (optional)
       camAz        — initial azimuth in rad    (default: 0.3)   (optional)
       camEl        — initial elevation in rad  (default: 0.18)  (optional)

     PART DEFINITION:
       {
         id:       'MeshNameInOBJ',   // must match "o" or "g" name in .obj
         name:     'Display Name',
         tag:      'Category',
         color:    0x0a4488,          // hex colour
         emissive: 0x020d22,          // hex emissive (darker version of color)
         desc:     'Description text shown in popup.',
         specs:    { Key: 'Value', Key2: 'Value2' },
         dotColor: '#0a84ff',         // CSS colour for the sidebar dot
       }
  ================================================================ */
  function createViewer(config) {
    const {
      containerId,
      objFile,
      title      = 'Model',
      tag        = 'Object',
      parts      = [],
      camDist: initDist = 22,
      camAz:   initAz   = 0.3,
      camEl:   initEl   = 0.18,
    } = config;

    const container = document.getElementById(containerId);
    if (!container) { console.error(`createViewer: no element with id "${containerId}"`); return; }

    /* Unique key so IDs and CSS never clash between instances */
    const uid = 'mv_' + Math.random().toString(36).slice(2, 8);

    /* ── Inject HTML ───────────────────────────────────────── */
    container.innerHTML = `
      <div id="${uid}_root" style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;font-family:'JetBrains Mono',monospace;font-weight:300;background:#020810;color:#e2eeff;">

        <!-- Header -->
        <div id="${uid}_header" style="display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;flex-shrink:0;background:#060f1e;border-bottom:1px solid #1a3a6a;position:relative;z-index:10;">
          <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#0a84ff,#00d4ff,#0a84ff,transparent);"></div>
          <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:0.2em;text-transform:uppercase;color:#e2eeff;display:flex;align-items:center;gap:8px;">
            <div id="${uid}_dot" style="width:6px;height:6px;background:#0a84ff;border-radius:50%;box-shadow:0 0 10px rgba(10,132,255,0.7);"></div>
            SYS_PREVIEW
          </div>
          <div style="font-size:0.58rem;color:#344d72;letter-spacing:0.1em;text-transform:uppercase;">
            OBJECT // <span style="color:#00d4ff;">${objFile.split('/').pop().toUpperCase()}</span>
          </div>
          <div style="display:flex;gap:5px;">
            <button id="${uid}_btn_wire" onclick="window['${uid}'].toggleWireframe()" style="background:transparent;border:1px solid #1a3a6a;color:#6b8ab5;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:0.56rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;border-radius:2px;transition:all 0.15s;">Wireframe</button>
            <button onclick="window['${uid}'].resetCamera()" style="background:transparent;border:1px solid #1a3a6a;color:#6b8ab5;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:0.56rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;border-radius:2px;transition:all 0.15s;">Reset</button>
          </div>
        </div>

        <!-- Viewer area -->
        <div id="${uid}_viewer" style="flex:1;position:relative;overflow:hidden;">

          <!-- Grid background -->
          <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(10,132,255,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(10,132,255,0.06) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;"></div>
          <!-- Radial vignette -->
          <div style="position:absolute;inset:0;background:radial-gradient(ellipse 65% 65% at 42% 50%,rgba(10,132,255,0.05) 0%,transparent 70%),radial-gradient(ellipse 100% 100% at 50% 50%,transparent 55%,rgba(2,8,16,0.85) 100%);pointer-events:none;z-index:1;"></div>

          <canvas id="${uid}_canvas" style="display:block;width:100%;height:100%;cursor:grab;position:relative;z-index:2;"></canvas>

          <!-- Scanline sweep -->
          <div style="position:absolute;left:0;width:calc(100% - 250px);height:1px;background:linear-gradient(90deg,transparent,rgba(10,132,255,0.35),transparent);pointer-events:none;z-index:3;opacity:0.5;animation:mv_scan_${uid} 6s linear infinite;"></div>
          <style>@keyframes mv_scan_${uid}{0%{top:0%;opacity:0}5%{opacity:0.5}95%{opacity:0.5}100%{top:100%;opacity:0}}</style>

          <!-- Corner brackets -->
          <div style="position:absolute;top:7px;left:7px;width:16px;height:16px;border-top:1px solid #0a84ff;border-left:1px solid #0a84ff;pointer-events:none;z-index:3;"></div>
          <div style="position:absolute;top:7px;right:257px;width:16px;height:16px;border-top:1px solid #0a84ff;border-right:1px solid #0a84ff;pointer-events:none;z-index:3;"></div>
          <div style="position:absolute;bottom:7px;left:7px;width:16px;height:16px;border-bottom:1px solid #0a84ff;border-left:1px solid #0a84ff;pointer-events:none;z-index:3;"></div>
          <div style="position:absolute;bottom:7px;right:257px;width:16px;height:16px;border-bottom:1px solid #0a84ff;border-right:1px solid #0a84ff;pointer-events:none;z-index:3;"></div>

          <!-- HUD -->
          <div style="position:absolute;top:14px;left:14px;pointer-events:none;z-index:5;">
            <div style="font-size:0.5rem;color:#344d72;text-transform:uppercase;letter-spacing:0.14em;line-height:2;">Distance</div>
            <div id="${uid}_hud_dist" style="font-size:0.6rem;color:#00d4ff;font-weight:400;">—</div>
            <div style="font-size:0.5rem;color:#344d72;text-transform:uppercase;letter-spacing:0.14em;line-height:2;margin-top:4px;">Azimuth</div>
            <div id="${uid}_hud_az" style="font-size:0.6rem;color:#00d4ff;font-weight:400;">—</div>
          </div>

          <!-- Zoom controls -->
          <div style="position:absolute;left:14px;bottom:18px;display:flex;gap:4px;z-index:5;">
            <button onclick="window['${uid}'].zoom(-1)" style="width:28px;height:28px;background:#060f1e;border:1px solid #1a3a6a;color:#6b8ab5;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:2px;font-family:'JetBrains Mono',monospace;transition:all 0.15s;">+</button>
            <button onclick="window['${uid}'].zoom(1)"  style="width:28px;height:28px;background:#060f1e;border:1px solid #1a3a6a;color:#6b8ab5;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:2px;font-family:'JetBrains Mono',monospace;transition:all 0.15s;">−</button>
            <button onclick="window['${uid}'].resetCamera()" style="width:28px;height:28px;background:#060f1e;border:1px solid #1a3a6a;color:#6b8ab5;font-size:0.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:2px;font-family:'JetBrains Mono',monospace;transition:all 0.15s;">⊙</button>
          </div>

          <!-- Sidebar -->
          <div style="position:absolute;right:0;top:0;bottom:0;width:250px;background:#060f1e;border-left:1px solid #1a3a6a;display:flex;flex-direction:column;z-index:5;overflow-y:auto;">
            <!-- Sidebar left glow line -->
            <div style="position:absolute;top:0;left:-1px;bottom:0;width:1px;background:linear-gradient(180deg,transparent,#0a84ff,#00d4ff,#0a84ff,transparent);"></div>

            <!-- Sidebar header -->
            <div style="padding:20px 18px 16px;border-bottom:1px solid #0e2040;">
              <div style="font-size:0.52rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:#0a84ff;margin-bottom:8px;display:flex;align-items:center;gap:7px;">
                <span style="display:inline-block;width:10px;height:1px;background:#0a84ff;box-shadow:0 0 8px rgba(10,132,255,0.6);"></span>
                ${tag}
              </div>
              <div style="font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:#e2eeff;line-height:1.1;letter-spacing:0.04em;text-transform:uppercase;">${title.replace('\n','<br>')}</div>
              <div style="font-size:0.55rem;color:#344d72;margin-top:7px;letter-spacing:0.08em;">// Drag · Scroll · Click to inspect</div>
            </div>

            <!-- Parts list -->
            <div style="padding:14px 18px;border-bottom:1px solid #0e2040;">
              <div style="font-size:0.5rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#344d72;margin-bottom:9px;">Components</div>
              <div id="${uid}_parts_list"></div>
            </div>

            <!-- Controls -->
            <div style="padding:14px 18px;display:flex;flex-direction:column;gap:6px;">
              <div style="font-size:0.5rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#344d72;margin-bottom:4px;">View Options</div>
              <button id="${uid}_ctrl_wire" onclick="window['${uid}'].toggleWireframe()" style="display:flex;align-items:center;gap:8px;padding:7px 11px;background:#0a1628;border:1px solid #1a3a6a;border-radius:2px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:#6b8ab5;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s;text-align:left;">
                <span style="color:#0a84ff;font-size:0.8rem;">◻</span> Wireframe
              </button>
              <button onclick="window['${uid}'].resetCamera()" style="display:flex;align-items:center;gap:8px;padding:7px 11px;background:#0a1628;border:1px solid #1a3a6a;border-radius:2px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:#6b8ab5;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s;text-align:left;">
                <span style="color:#0a84ff;font-size:0.8rem;">↺</span> Reset Camera
              </button>
            </div>

            <!-- Footer hints -->
            <div style="margin-top:auto;padding:12px 18px;border-top:1px solid #0e2040;">
              ${[['Orbit','Left Drag'],['Zoom','Scroll'],['Pan','Right Drag'],['Inspect','Click Part']].map(([l,v])=>`
              <div style="display:flex;justify-content:space-between;padding:3px 0;">
                <span style="font-size:0.5rem;color:#344d72;letter-spacing:0.1em;text-transform:uppercase;">${l}</span>
                <span style="font-size:0.52rem;color:#6b8ab5;">${v}</span>
              </div>`).join('')}
            </div>
          </div>

          <!-- Info popup -->
          <div id="${uid}_popup" style="position:absolute;background:#060f1e;border:1px solid #0a84ff;padding:16px;width:245px;pointer-events:all;box-shadow:0 0 24px rgba(10,132,255,0.25),0 0 60px rgba(10,132,255,0.1),0 24px 80px rgba(0,0,0,0.7);border-radius:2px;transition:all 0.2s cubic-bezier(0.16,1,0.3,1);z-index:100;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);opacity:0;transform:scale(0.94) translateY(8px);pointer-events:none;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;">
              <div>
                <div id="${uid}_popup_tag"  style="font-size:0.5rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#0a84ff;margin-bottom:4px;"></div>
                <div id="${uid}_popup_name" style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.15rem;color:#e2eeff;letter-spacing:0.06em;text-transform:uppercase;line-height:1.1;"></div>
              </div>
              <button onclick="window['${uid}'].closePopup()" style="background:#0a1628;border:1px solid #1a3a6a;color:#344d72;cursor:pointer;width:20px;height:20px;border-radius:2px;font-size:0.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;transition:all 0.15s;">✕</button>
            </div>
            <div style="height:1px;background:linear-gradient(90deg,#0a84ff,transparent);margin:10px 0;"></div>
            <div id="${uid}_popup_desc"  style="font-size:0.6rem;color:#6b8ab5;line-height:1.8;margin-bottom:13px;font-weight:300;"></div>
            <div id="${uid}_popup_specs" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
          </div>

          <!-- Loading screen -->
          <div id="${uid}_loading" style="position:absolute;inset:0;background:#020810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity 0.5s;">
            <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.7rem;color:#e2eeff;letter-spacing:0.25em;text-transform:uppercase;">${title.replace('\n',' ').replace('<br>',' ')}</div>
            <div style="font-size:0.55rem;color:#344d72;letter-spacing:0.2em;text-transform:uppercase;margin-top:5px;margin-bottom:24px;">// Loading 3D Model</div>
            <div style="width:160px;height:1px;background:#1a3a6a;overflow:hidden;">
              <div style="height:100%;background:linear-gradient(90deg,#0a84ff,#00d4ff);box-shadow:0 0 10px #0a84ff;animation:mv_load_${uid} 1.6s cubic-bezier(0.4,0,0.2,1) forwards;"></div>
            </div>
            <style>@keyframes mv_load_${uid}{from{width:0%}to{width:100%}}</style>
            <div id="${uid}_load_txt" style="font-size:0.52rem;color:#344d72;text-transform:uppercase;letter-spacing:0.18em;margin-top:11px;">Initializing...</div>
          </div>

        </div><!-- end viewer area -->
      </div><!-- end root -->
    `;

    /* ── Three.js init ─────────────────────────────────────── */
    const canvas   = document.getElementById(`${uid}_canvas`);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.setClearColor(0x000000, 0);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.01, 500);
    let camDist = initDist, camAz = initAz, camEl = initEl;
    let camTarget = new THREE.Vector3(0, 0, 0);

    scene.add(new THREE.AmbientLight(0x0a1a3a, 1.2));
    const kl = new THREE.DirectionalLight(0xd0e8ff, 3.0);
    kl.position.set(5, 14, 9); kl.castShadow = true;
    kl.shadow.mapSize.width = kl.shadow.mapSize.height = 2048;
    kl.shadow.bias = -0.001; scene.add(kl);
    scene.add(Object.assign(new THREE.DirectionalLight(0x0a84ff, 1.4), { position: new THREE.Vector3(-9, 3, 5) }));
    scene.add(Object.assign(new THREE.DirectionalLight(0x00d4ff, 0.9), { position: new THREE.Vector3(2, -4, -10) }));
    scene.add(Object.assign(new THREE.PointLight(0x1a5eff, 0.6, 30), { position: new THREE.Vector3(0, 0, 6) }));
    const gnd = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.ShadowMaterial({ opacity: 0.25 }));
    gnd.rotation.x = -Math.PI/2; gnd.position.y = -7; gnd.receiveShadow = true; scene.add(gnd);

    /* ── Load model ────────────────────────────────────────── */
    const modelGroup   = new THREE.Group(); scene.add(modelGroup);
    const meshes       = {};
    const partMeshList = [];

    new THREE.OBJLoader().load(
      objFile,
      (obj) => {
        const rb = new THREE.Box3().setFromObject(obj);
        const rs = new THREE.Vector3(); rb.getSize(rs);
        obj.scale.setScalar(10 / Math.max(rs.x, rs.y, rs.z));
        modelGroup.add(obj);
        const b = new THREE.Box3().setFromObject(modelGroup);
        const c = new THREE.Vector3(); b.getCenter(c);
        modelGroup.position.sub(c);

        obj.traverse(child => {
          if (!child.isMesh) return;
          const p = parts.find(x => x.id === child.name) || parts[0];
          if (!p) return;
          child.material = new THREE.MeshStandardMaterial({
            color: new THREE.Color(p.color),
            emissive: new THREE.Color(p.emissive),
            metalness: 0.18, roughness: 0.52
          });
          child.castShadow = child.receiveShadow = true;
          child.userData.partId = p.id;
          partMeshList.push({ mesh: child, partId: p.id });
          if (!meshes[p.id]) meshes[p.id] = child;
        });
        buildPartsUI();
        dismissLoading();
      },
      (xhr) => {
        const el = document.getElementById(`${uid}_load_txt`);
        if (el && xhr.total) el.textContent = `Loading... ${Math.round(xhr.loaded / xhr.total * 100)}%`;
      },
      (err) => {
        const el = document.getElementById(`${uid}_load_txt`);
        if (el) el.textContent = 'Error — check filename & path.';
        console.error(`[${uid}] OBJ load error:`, err);
      }
    );

    /* ── Parts UI ──────────────────────────────────────────── */
    function buildPartsUI() {
      const list = document.getElementById(`${uid}_parts_list`);
      list.innerHTML = '';
      parts.forEach(p => {
        const d = document.createElement('div');
        d.id = `${uid}_pi_${p.id}`;
        d.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:2px;border:1px solid transparent;transition:all 0.15s;margin-bottom:3px;';
        d.innerHTML = `
          <div style="width:6px;height:6px;border-radius:50%;background:${p.dotColor};flex-shrink:0;"></div>
          <div style="font-size:0.62rem;font-weight:400;color:#e2eeff;letter-spacing:0.06em;text-transform:uppercase;">${p.name}</div>
        `;
        d.onmouseenter = () => { if (!d.dataset.selected) d.style.background = '#0d1f38'; };
        d.onmouseleave = () => { if (!d.dataset.selected) d.style.background = 'transparent'; };
        d.onclick = () => selectPart(p.id);
        list.appendChild(d);
      });
    }

    /* ── Raycasting ────────────────────────────────────────── */
    const raycaster = new THREE.Raycaster();
    let isDragging = false, isRightDrag = false;
    let lastX = 0, lastY = 0;
    let mouseMovedAfterDown = false;

    canvas.addEventListener('mousedown', e => {
      isDragging = true; isRightDrag = e.button === 2;
      lastX = e.clientX; lastY = e.clientY;
      mouseMovedAfterDown = false;
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    canvas.addEventListener('mousemove', e => {
      if (!isDragging) return;
      mouseMovedAfterDown = true;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      if (isRightDrag) {
        const right = new THREE.Vector3();
        right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
        camTarget.addScaledVector(right, -dx * 0.012);
        camTarget.addScaledVector(camera.up, dy * 0.012);
      } else {
        camAz -= dx * 0.007;
        camEl = Math.max(-1.3, Math.min(1.3, camEl - dy * 0.007));
      }
      lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      camDist = Math.max(3, Math.min(80, camDist + e.deltaY * 0.04));
    }, { passive: false });

    let lastTouchDist = 0;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) { isDragging = true; isRightDrag = false; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
      else if (e.touches.length === 2) lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && isDragging) {
        camAz -= (e.touches[0].clientX - lastX) * 0.007;
        camEl = Math.max(-1.3, Math.min(1.3, camEl - (e.touches[0].clientY - lastY) * 0.007));
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        camDist = Math.max(3, Math.min(80, camDist - (d - lastTouchDist) * 0.04));
        lastTouchDist = d;
      }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { isDragging = false; });

    canvas.addEventListener('click', e => {
      if (mouseMovedAfterDown) return;
      const rect = canvas.getBoundingClientRect();
      raycaster.setFromCamera(new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        ((e.clientY - rect.top)  / rect.height) * -2 + 1
      ), camera);
      const hits = raycaster.intersectObjects(partMeshList.map(p => p.mesh), true);
      if (hits.length > 0 && hits[0].object.userData.partId) {
        selectPart(hits[0].object.userData.partId, e.clientX, e.clientY);
      } else { deselectAll(); }
    });

    /* ── Selection & popup ─────────────────────────────────── */
    let selectedPart = null;

    function selectPart(partId, cx, cy) {
      deselectAll();
      selectedPart = partId;
      partMeshList.forEach(({ mesh, partId: pid }) => {
        if (pid !== partId) return;
        mesh.material.emissive.setHex(0x003a88);
        mesh.material.emissiveIntensity = 2.0;
      });
      const piEl = document.getElementById(`${uid}_pi_${partId}`);
      if (piEl) {
        piEl.dataset.selected = '1';
        piEl.style.background = 'rgba(10,132,255,0.1)';
        piEl.style.borderColor = '#0a84ff';
      }
      const p = parts.find(x => x.id === partId);
      if (p) showPopup(p, cx, cy);
    }

    function deselectAll() {
      if (selectedPart) {
        const p = parts.find(x => x.id === selectedPart);
        partMeshList.forEach(({ mesh, partId: pid }) => {
          if (pid !== selectedPart) return;
          mesh.material.emissive.setHex(p ? p.emissive : 0);
          mesh.material.emissiveIntensity = 1;
        });
        const piEl = document.getElementById(`${uid}_pi_${selectedPart}`);
        if (piEl) { delete piEl.dataset.selected; piEl.style.background = 'transparent'; piEl.style.borderColor = 'transparent'; }
      }
      selectedPart = null;
      closePopup();
    }

    function showPopup(p, cx, cy) {
      const popup = document.getElementById(`${uid}_popup`);
      document.getElementById(`${uid}_popup_tag`).textContent  = p.tag;
      document.getElementById(`${uid}_popup_name`).textContent = p.name;
      document.getElementById(`${uid}_popup_desc`).textContent = p.desc;
      const specs = document.getElementById(`${uid}_popup_specs`);
      specs.innerHTML = '';
      Object.entries(p.specs || {}).forEach(([k, v]) => {
        specs.innerHTML += `<div><div style="font-size:0.48rem;color:#344d72;text-transform:uppercase;letter-spacing:0.14em;">${k}</div><div style="font-size:0.62rem;color:#00d4ff;margin-top:3px;">${v}</div></div>`;
      });
      const vr = document.getElementById(`${uid}_viewer`).getBoundingClientRect();
      let x = cx !== undefined ? cx - vr.left + 12 : 150;
      let y = cy !== undefined ? cy - vr.top  - 34 : 150;
      x = Math.max(8, Math.min(x, vr.width - 265));
      y = Math.max(8, Math.min(y, vr.height - 280));
      popup.style.left = x + 'px'; popup.style.top = y + 'px';
      popup.style.opacity = '1'; popup.style.transform = 'scale(1) translateY(0)'; popup.style.pointerEvents = 'all';
    }

    function closePopup() {
      const popup = document.getElementById(`${uid}_popup`);
      popup.style.opacity = '0'; popup.style.transform = 'scale(0.94) translateY(8px)'; popup.style.pointerEvents = 'none';
    }

    /* ── Resize & render loop ──────────────────────────────── */
    function resize() {
      const viewer = document.getElementById(`${uid}_viewer`);
      const w = viewer.clientWidth - 250;
      const h = viewer.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    (function animate() {
      requestAnimationFrame(animate);
      const x = camDist * Math.cos(camEl) * Math.sin(camAz);
      const y = camDist * Math.sin(camEl);
      const z = camDist * Math.cos(camEl) * Math.cos(camAz);
      camera.position.set(x + camTarget.x, y + camTarget.y, z + camTarget.z);
      camera.lookAt(camTarget);
      const d = document.getElementById(`${uid}_hud_dist`);
      const a = document.getElementById(`${uid}_hud_az`);
      if (d) d.textContent = camDist.toFixed(1);
      if (a) a.textContent = (camAz * 180 / Math.PI).toFixed(1) + '°';
      renderer.render(scene, camera);
    })();

    function dismissLoading() {
      const el = document.getElementById(`${uid}_loading`);
      if (!el) return;
      el.style.opacity = '0'; el.style.pointerEvents = 'none';
      setTimeout(() => el.remove(), 600);
    }

    /* ── Wireframe ─────────────────────────────────────────── */
    let wireframeOn = false;
    function toggleWireframe() {
      wireframeOn = !wireframeOn;
      const bw = document.getElementById(`${uid}_btn_wire`);
      const cw = document.getElementById(`${uid}_ctrl_wire`);
      const on = 'background:rgba(10,132,255,0.12);border-color:#0a84ff;color:#00d4ff;';
      const off = 'background:transparent;border-color:#1a3a6a;color:#6b8ab5;';
      if (bw) bw.style.cssText += wireframeOn ? on : off;
      if (cw) cw.style.cssText += wireframeOn ? on : off;
      partMeshList.forEach(({ mesh }) => { mesh.material.wireframe = wireframeOn; });
    }

    /* ── Public API exposed on window[uid] ─────────────────── */
    window[uid] = {
      zoom(dir)        { camDist = Math.max(3, Math.min(80, camDist + dir * 2.5)); },
      resetCamera()    { camDist = initDist; camAz = initAz; camEl = initEl; camTarget.set(0,0,0); },
      toggleWireframe,
      closePopup,
    };
  }


  /* ================================================================
     INSTANTIATE VIEWERS
     ─────────────────────────────────────────────────────────────
     Call createViewer() once for each viewer slot on your page.
     - containerId must match the id of your <div> wrapper
     - objFile is the path to your .obj (relative to the HTML file)
     - parts: each id must match a mesh name inside your .obj
       (open the .obj in a text editor, look for lines starting
        with "o" or "g" — those are the mesh names)
  ================================================================ */

  /* ── Viewer 1: Football Helmet ─────────────────────────── */
  createViewer({
    containerId: 'viewer-A',
    objFile:     'helmet.obj',          /* ← your .obj filename */
    title:       'Football\nHelmet',
    tag:         'Protective Equipment',
    parts: [
      {
        id:       '10503_Football_helmet_v1_SG', /* ← mesh name in OBJ */
        name:     'Football Helmet',
        tag:      'Protective Gear',
        color:    0x0a4488,
        emissive: 0x020d22,
        desc:     'Full American football helmet with integrated face mask and chin strap. Engineered for maximum impact absorption.',
        specs:    { Standard: 'NOCSAE', Shell: 'Polycarbonate', Padding: 'TPU Foam', Weight: '~2.0 kg' },
        dotColor: '#0a84ff',
      },
    ],
  });

  /* ── Viewer 2: Second Model ────────────────────────────── */
  createViewer({
    containerId: 'viewer-B',
    objFile:     'helmet.obj',          /* ← swap with your second .obj */
    title:       'Second\nModel',
    tag:         'Your Category',
    camAz:       -0.4,                  /* different starting angle */
    parts: [
      {
        id:       '10503_Football_helmet_v1_SG', /* ← mesh name in OBJ */
        name:     'Model Part',
        tag:      'Structure',
        color:    0x1a6a3a,             /* green tint for visual variety */
        emissive: 0x021a0a,
        desc:     'Replace this with your own model and part description.',
        specs:    { Type: 'Custom', Material: 'Unknown', Scale: '1:1', Unit: 'Meters' },
        dotColor: '#00d4aa',
      },
    ],
  });
